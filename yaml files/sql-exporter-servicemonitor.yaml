apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: sql-exporter

  labels:
    app: sql-exporter
    release: monitoring

spec:
  selector:
    matchLabels:
      app: sql-exporter

  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s

  namespaceSelector:
    matchNames:
      - default