apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver

spec:
  replicas: 1

  selector:
    matchLabels:
      app: sqlserver

  template:
    metadata:
      labels:
        app: sqlserver

    spec:
      securityContext:
        fsGroup: 10001

      containers:
      - name: sqlserver

        image: mcr.microsoft.com/mssql/server:2025-latest

        ports:
        - containerPort: 1433

        env:
        - name: ACCEPT_EULA
          value: "Y"

        - name: MSSQL_PID
          value: "Developer"

        - name: MSSQL_SA_PASSWORD
          value: "Str0ngPassword!123"

        volumeMounts:
        - name: mssql-storage
          mountPath: /var/opt/mssql

        readinessProbe:
          tcpSocket:
            port: 1433
          initialDelaySeconds: 30
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 1433
          initialDelaySeconds: 60
          periodSeconds: 20

        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"

          limits:
            memory: "4Gi"
            cpu: "2"

      volumes:
      - name: mssql-storage
        persistentVolumeClaim:
          claimName: mssql-data-pvc